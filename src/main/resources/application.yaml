spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gpt-oss:20b
          keep-alive: 1h
          temperature: 0.7
    mcp:
      client:
        enabled: false
        sse:
          connections:
            profiles-generator-mcp-sse:
              url: http://localhost:8085
              sse-endpoint: /sse
            date-time-mcp-sse:
              url: http://localhost:8086
              sse-endpoint: /sse
            math-tool-mcp-sse:
              url: http://localhost:8087
              sse-endpoint: /sse

logging:
  level:
    org.springframework.ai: DEBUG
    io.modelcontextprotocol: DEBUG
